# Prometheus Stack Helm Values
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: "400Mi"
        cpu: "200m"
      limits:
        memory: "800Mi"
        cpu: "500m"

grafana:
  adminPassword: admin123
  service:
    type: LoadBalancer

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "100Mi"
        cpu: "50m"
